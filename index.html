<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢讀經班加分系統</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://bundle.run/lucide-react@latest"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
        }

        .poke-shadow {
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5), 0 2px 4px -1px rgba(59, 130, 246, 0.25);
        }

        /* QTE 按鈕震動效果 */
        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(3px, 2px) rotate(0deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            50% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            70% {
                transform: translate(3px, 1px) rotate(-1deg);
            }

            80% {
                transform: translate(-1px, -1px) rotate(1deg);
            }

            90% {
                transform: translate(1px, 2px) rotate(0deg);
            }

            100% {
                transform: translate(1px, -2px) rotate(-1deg);
            }
        }

        .shake {
            animation: shake 0.3s;
            animation-iteration-count: infinite;
        }

        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        .animate-pulse-slow {
            animation: pulse-slow 3s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Configuration ---
        const GAS_DEPLOY_URL = 'https://script.google.com/macros/s/AKfycbyvvwgGJChzV8Y9oe3yLY9dNS2dpBVZr_ZfNi_QNLN7IrIlJ3LGSRlFls2MrpRgc_n8bA/exec'; // 必須替換
        const USE_LOCAL_AUDIO = false; // 切換音效引擎

        // --- Audio System ---
        const AudioController = {
            ctx: null,
            init() {
                if (!this.ctx && !USE_LOCAL_AUDIO) {
                    // 解除瀏覽器對於自動播放的限制，需由使用者操作觸發
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playSynth(freq, type, duration) {
                if (USE_LOCAL_AUDIO) return;
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                gain.gain.setValueAtTime(1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.stop(this.ctx.currentTime + duration);
            },
            playClick() {
                if (USE_LOCAL_AUDIO) new Audio('./assets/click.mp3').play().catch(() => { });
                else this.playSynth(800, 'sine', 0.1);
            },
            playSuccess() {
                if (USE_LOCAL_AUDIO) {
                    new Audio('./assets/evolve.mp3').play().catch(() => { });
                } else {
                    this.playSynth(523.25, 'triangle', 0.3); // C5
                    setTimeout(() => this.playSynth(659.25, 'triangle', 0.3), 150); // E5
                    setTimeout(() => this.playSynth(783.99, 'triangle', 0.6), 300); // G5
                }
            },
            playFail() {
                if (USE_LOCAL_AUDIO) new Audio('./assets/fail.mp3').play().catch(() => { });
                else this.playSynth(150, 'sawtooth', 0.8);
            }
        };

        // --- Utility Functions ---
        // 計算當前處於哪個階段 (0~4對應五個階段)
        const getStageIndex = (energy, thresholds) => {
            for (let i = 0; i < thresholds.length; i++) {
                if (energy < thresholds[i]) return i;
            }
            return thresholds.length - 1; // 滿級
        };

        // --- Main Application ---
        function App() {
            const [data, setData] = useState({ students: [], pokemons: [] });
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [newStudentName, setNewStudentName] = useState('');

            // Game States
            const [feedSeq, setFeedSeq] = useState({ active: false, chunksLeft: 0, amount: 0, remainder: 0, originalState: null });
            const [qte, setQte] = useState({ active: false, clicks: 0, timeLeft: 5, targetStage: 0 });

            const fetchAllData = useCallback(async () => {
                setSyncing(true);
                try {
                    const res = await fetch(`${GAS_DEPLOY_URL}?action=getAll`);
                    const json = await res.json();
                    if (json.status === 200) setData(json.data);
                    else alert('API Error: ' + json.data.error);
                } catch (err) {
                    alert('Network Error');
                } finally {
                    setLoading(false);
                    setSyncing(false);
                }
            }, []);

            useEffect(() => {
                if (GAS_DEPLOY_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
                    alert("請先替換 GAS_DEPLOY_URL");
                    setLoading(false);
                    return;
                }
                fetchAllData();
            }, [fetchAllData]);

            // --- API Wrappers ---
            const handleAddStudent = async () => {
                if (!newStudentName.trim()) return;
                setLoading(true);
                try {
                    const res = await fetch(GAS_DEPLOY_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'addStudent', name: newStudentName })
                    });
                    const json = await res.json();
                    if (json.status === 200) {
                        setNewStudentName('');
                        await fetchAllData();
                    } else alert(json.data.error);
                } catch (e) { alert('新增失敗'); }
                setLoading(false);
            };

            const handleDeleteStudent = async (id) => {
                if (!confirm('確定要刪除這位小朋友並釋放寶可夢嗎？')) return;
                setLoading(true);
                try {
                    await fetch(GAS_DEPLOY_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteStudent', id }) });
                    setSelectedStudent(null);
                    await fetchAllData();
                } catch (e) { }
                setLoading(false);
            };

            const handleUpdateEnergyAPI = async (id, energy, feedableEnergy) => {
                try {
                    await fetch(GAS_DEPLOY_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'updateEnergy', id, energy, feedableEnergy })
                    });
                } catch (e) { console.error('Update fail', e); }
            };

            // --- Game Logic ---
            const getPokemonData = (pokemonName) => data.pokemons.find(p => p.mainName === pokemonName);

            const startFeeding = () => {
                if (!selectedStudent || selectedStudent.feedableEnergy <= 0) return;
                AudioController.playClick();

                const total = selectedStudent.feedableEnergy;
                const amount = Math.floor(total / 5);
                const remainder = total % 5;

                setFeedSeq({
                    active: true,
                    chunksLeft: 5,
                    amount,
                    remainder,
                    originalState: { energy: selectedStudent.energy, feedable: selectedStudent.feedableEnergy }
                });
            };

            const processFeedClick = () => {
                if (!feedSeq.active || !selectedStudent) return;
                AudioController.playClick();

                const poke = getPokemonData(selectedStudent.pokemonName);
                let feedAmount = feedSeq.amount;

                // 最後一次餵養加上餘數
                if (feedSeq.chunksLeft === 1) feedAmount += feedSeq.remainder;

                const currentStage = getStageIndex(selectedStudent.energy, poke.thresholds);
                const nextEnergy = selectedStudent.energy + feedAmount;
                const nextFeedable = selectedStudent.feedableEnergy - feedAmount;
                const nextStage = getStageIndex(nextEnergy, poke.thresholds);

                // 觸發進化 QTE
                if (nextStage > currentStage) {
                    setFeedSeq(prev => ({ ...prev, active: false })); // 暫停餵養
                    setQte({ active: true, clicks: 0, timeLeft: 5, targetStage: nextStage });
                    // 暫存數值但不寫入資料庫，等待 QTE 結果
                    setSelectedStudent({ ...selectedStudent, energy: nextEnergy, feedableEnergy: nextFeedable });
                    return;
                }

                // 正常餵養更新
                const updatedStudent = { ...selectedStudent, energy: nextEnergy, feedableEnergy: nextFeedable };
                setSelectedStudent(updatedStudent);

                // 更新本地端暫存的 Data，使外層卡片也能連動
                setData(prev => ({
                    ...prev,
                    students: prev.students.map(s => s.id === updatedStudent.id ? updatedStudent : s)
                }));

                if (feedSeq.chunksLeft === 1) {
                    // 餵養結束，回寫資料庫
                    setFeedSeq({ active: false, chunksLeft: 0, amount: 0, remainder: 0, originalState: null });
                    handleUpdateEnergyAPI(updatedStudent.id, nextEnergy, nextFeedable);
                } else {
                    setFeedSeq(prev => ({ ...prev, chunksLeft: prev.chunksLeft - 1 }));
                }
            };

            // QTE Timer
            useEffect(() => {
                let timer;
                if (qte.active && qte.timeLeft > 0) {
                    timer = setInterval(() => {
                        setQte(prev => {
                            if (prev.timeLeft <= 1) {
                                clearInterval(timer);
                                handleQteResult(false);
                                return { ...prev, timeLeft: 0 };
                            }
                            return { ...prev, timeLeft: prev.timeLeft - 1 };
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [qte.active, qte.timeLeft]);

            const handleQteClick = () => {
                if (!qte.active) return;
                AudioController.playClick();
                setQte(prev => {
                    const newClicks = prev.clicks + 1;
                    if (newClicks >= 8) {
                        handleQteResult(true);
                    }
                    return { ...prev, clicks: newClicks };
                });
            };

            const handleQteResult = (success) => {
                setQte(prev => ({ ...prev, active: false }));
                if (success) {
                    AudioController.playSuccess();
                    // 進化成功：儲存暫存的數值到資料庫，並恢復餵養序列（如果還有剩餘）
                    setData(prev => ({
                        ...prev,
                        students: prev.students.map(s => s.id === selectedStudent.id ? selectedStudent : s)
                    }));

                    const updatedStudent = { ...selectedStudent };
                    setData(prev => ({
                        ...prev,
                        students: prev.students.map(s => s.id === updatedStudent.id ? updatedStudent : s)
                    }));

                    if (feedSeq.chunksLeft > 1) {
                        setFeedSeq(prev => ({ ...prev, active: true, chunksLeft: prev.chunksLeft - 1 }));
                    } else {
                        handleUpdateEnergyAPI(updatedStudent.id, updatedStudent.energy, updatedStudent.feedableEnergy);
                        setFeedSeq({ active: false, chunksLeft: 0, amount: 0, remainder: 0, originalState: null });
                    }
                } else {
                    AudioController.playFail();
                    // 進化失敗：退回最初狀態
                    const rollback = feedSeq.originalState;
                    const revertedStudent = { ...selectedStudent, energy: rollback.energy, feedableEnergy: rollback.feedable };
                    setSelectedStudent(revertedStudent);
                    setData(prev => ({
                        ...prev,
                        students: prev.students.map(s => s.id === revertedStudent.id ? revertedStudent : s)
                    }));
                    setFeedSeq({ active: false, chunksLeft: 0, amount: 0, remainder: 0, originalState: null });
                    handleUpdateEnergyAPI(revertedStudent.id, rollback.energy, rollback.feedable); // 同步回原始狀態以防萬一
                    alert('進化失敗！精華能量流失，請重新累積再挑戰。');
                }
            };

            // --- Render Helpers ---
            if (loading && data.students.length === 0) return <div className="flex justify-center items-center h-screen font-bold text-xl text-blue-600">載入中...</div>;

            return (
                <div className="container mx-auto p-4 max-w-5xl">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6 bg-blue-500 text-white p-4 rounded-xl shadow-md">
                        <h1 className="text-2xl font-black tracking-widest flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="3" /><line x1="12" y1="2" x2="12" y2="9" /><line x1="12" y1="15" x2="12" y2="22" /><line x1="22" y1="12" x2="15" y2="12" /><line x1="9" y1="12" x2="2" y2="12" /></svg>
                            寶可夢讀經班加分系統
                        </h1>
                        {/* 隱藏重新整理按鈕 */}
                        <button onClick={fetchAllData} className="opacity-30 hover:opacity-100 transition-opacity p-2">
                            <svg className={`w-5 h-5 ${syncing ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                    </div>

                    {/* Add Student Form */}
                    <div className="mb-8 flex gap-2">
                        <input
                            type="text"
                            value={newStudentName}
                            onChange={e => setNewStudentName(e.target.value)}
                            placeholder="輸入小朋友名字"
                            className="border-2 border-blue-300 rounded-lg p-2 flex-grow focus:outline-none focus:border-blue-500 font-bold"
                        />
                        <button onClick={handleAddStudent} disabled={loading} className="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-colors">
                            新增配對
                        </button>
                    </div>

                    {/* Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {data.students.map(student => {
                            const poke = getPokemonData(student.pokemonName);
                            const stageIndex = poke ? getStageIndex(student.energy, poke.thresholds) : 0;
                            const imageUrl = poke ? poke.images[stageIndex] : '';

                            return (
                                <div key={student.id} onClick={() => setSelectedStudent(student)}
                                    className="bg-white rounded-2xl p-4 poke-shadow cursor-pointer hover:-translate-y-1 transition-transform border-2 border-transparent hover:border-blue-400 flex flex-col items-center">
                                    <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-3 overflow-hidden border-4 border-blue-100 relative">
                                        {imageUrl ? <img src={imageUrl} alt={poke?.mainName} className="w-full h-full object-cover" /> : <div className="text-gray-400">?</div>}
                                        {student.feedableEnergy > 0 && (
                                            <span className="absolute top-0 right-0 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full animate-bounce">!</span>
                                        )}
                                    </div>
                                    <h2 className="text-xl font-black text-gray-800">{student.name}</h2>
                                    <div className="flex flex-col items-center">
                                        <p className="text-xs font-bold text-blue-400 uppercase tracking-widest">{student.pokemonName}</p>
                                        <p className="text-md font-bold text-gray-600">
                                            {poke ? poke.stageNames[stageIndex] : '載入中...'}
                                        </p>
                                    </div>
                                    <div className="w-full mt-3 bg-gray-200 rounded-full h-3 overflow-hidden">
                                        <div className="bg-blue-500 h-3" style={{ width: `${Math.min(100, (student.energy / (poke?.thresholds[4] || 1)) * 100)}%` }}></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Detail Modal [UPDATED] */}
                    {selectedStudent && !qte.active && (() => {
                        const poke = getPokemonData(selectedStudent.pokemonName);
                        const stageIndex = poke ? getStageIndex(selectedStudent.energy, poke.thresholds) : 0;
                        const currentStageImg = poke ? poke.images[stageIndex] : '';
                        const currentStageName = poke ? poke.stageNames[stageIndex] : '未知階段';

                        return (
                            <div className="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center z-40 p-4 backdrop-blur-sm">
                                <div className="bg-white rounded-3xl w-full max-w-lg p-8 relative shadow-2xl border-4 border-blue-400">
                                    <button onClick={() => { setSelectedStudent(null); setFeedSeq({ active: false, chunksLeft: 0 }); }} className="absolute top-4 right-4 text-gray-400 hover:text-gray-700 transition-colors">
                                        <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>

                                    {/* 大圖示顯示區 [NEW] */}
                                    <div className="flex flex-col items-center mb-6">
                                        <div className="w-48 h-48 bg-gradient-to-b from-blue-50 to-white rounded-full flex items-center justify-center mb-4 overflow-hidden border-8 border-blue-100 shadow-inner">
                                            <img src={currentStageImg} alt={currentStageName} className="w-40 h-40 object-contain animate-pulse-slow" />
                                        </div>
                                        <h3 className="text-xl font-bold text-blue-400 tracking-tighter uppercase mb-1">Current Evolution</h3>
                                        <h2 className="text-4xl font-black text-gray-800 mb-1">{currentStageName}</h2>
                                        <p className="text-lg font-bold text-gray-400">所屬學生：{selectedStudent.name}</p>
                                    </div>

                                    <div className="bg-blue-50 rounded-2xl p-6 mb-6 border-2 border-blue-100 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="font-bold text-blue-800 text-lg">目前精華能量</span>
                                            <span className="font-black text-blue-600 text-3xl">{selectedStudent.energy}</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-4 mb-4">
                                            <div className="bg-blue-500 h-4 rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (selectedStudent.energy / (poke?.thresholds?.[4] || 1)) * 100)}%` }}></div>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold text-green-800 text-lg">可餵養剩餘</span>
                                            <span className="font-black text-green-500 text-3xl">{selectedStudent.feedableEnergy}</span>
                                        </div>
                                    </div>

                                    {/* Feeding Action */}
                                    <div className="flex flex-col gap-4">
                                        {selectedStudent.feedableEnergy > 0 && !feedSeq.active && (
                                            <button onClick={startFeeding} className="bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl shadow-lg text-2xl transform active:scale-95 transition-all">
                                                開始餵養
                                            </button>
                                        )}
                                        {feedSeq.active && (
                                            <button onClick={processFeedClick} className="bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-black py-5 rounded-2xl shadow-xl text-3xl shake border-b-8 border-yellow-600">
                                                點擊注入能量 ({5 - feedSeq.chunksLeft + 1}/5)
                                            </button>
                                        )}
                                    </div>

                                    <div className="mt-8 pt-4 border-t-2 border-dashed border-gray-200 text-center">
                                        <button onClick={() => handleDeleteStudent(selectedStudent.id)} className="text-red-300 font-bold hover:text-red-500 transition-colors">
                                            釋放此寶可夢 (刪除資料)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* QTE Modal (Full Screen Overlay) */}
                    {qte.active && (
                        <div className="fixed inset-0 bg-red-900 bg-opacity-95 flex flex-col justify-center items-center z-50 text-white p-4 select-none">
                            <h1 className="text-5xl font-black mb-4 text-yellow-400 animate-pulse">進化發生中！</h1>
                            <p className="text-2xl font-bold mb-8">連擊按鈕注入能量！剩餘時間: <span className="text-red-300">{qte.timeLeft}</span> 秒</p>

                            <button
                                onClick={handleQteClick}
                                className="w-64 h-64 bg-red-500 rounded-full border-8 border-yellow-400 shadow-[0_0_50px_rgba(250,204,21,0.8)] flex items-center justify-center active:scale-95 transition-transform"
                            >
                                <span className="text-6xl font-black">{qte.clicks} / 8</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
